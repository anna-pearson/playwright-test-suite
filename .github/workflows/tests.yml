# This workflow runs your Playwright tests automatically
# whenever someone opens or updates a pull request.
#
# If any test fails, the PR gets blocked from merging.

name: Playwright Tests

# When does this run?
on:
  pull_request:       # runs on every PR
    branches: [main]  # targeting the main branch
  push:
    branches: [main]  # also runs when code lands on main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # kill the job if it takes too long

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci
        # npm ci is like npm install but faster and stricter
        # it uses the exact versions from package-lock.json

      # Step 4: Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        # --with-deps also installs system-level dependencies
        # (fonts, libraries) that the browser needs on Linux

      # Step 5: Run the tests
      - name: Run Playwright tests
        run: npx playwright test
        # if ANY test fails, this step fails,
        # which fails the whole workflow,
        # which blocks the PR from merging

      # Step 6: Upload test results if something failed
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
        # this saves screenshots and traces from failed tests
        # so you can debug without re-running locally

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MixDeck — DJ Mix Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">MixDeck</h1>
      <p class="tagline">DJ Mix Player</p>
    </header>

    <main>
      <!-- Now Playing -->
      <section class="now-playing" aria-label="Now playing">
        <div class="artwork" aria-hidden="true">
          <div class="artwork-placeholder">
            <span class="artwork-icon">&#9835;</span>
          </div>
        </div>

        <div class="track-details">
          <h2 class="track-title">No track selected</h2>
          <p class="track-artist"></p>
          <div class="track-meta">
            <span class="meta-bpm" aria-label="BPM"></span>
            <span class="meta-genre" aria-label="Genre"></span>
            <span class="meta-key" aria-label="Key"></span>
          </div>
        </div>

        <canvas class="waveform" width="800" height="100" aria-label="Audio waveform visualization"></canvas>
      </section>

      <!-- Transport Controls -->
      <section class="transport" aria-label="Playback controls">
        <div class="progress-row">
          <span class="time-current" aria-label="Current time">0:00</span>
          <div class="progress-track" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
            <div class="progress-fill"></div>
            <div class="progress-handle"></div>
          </div>
          <span class="time-duration" aria-label="Duration">0:00</span>
        </div>

        <div class="controls-row">
          <div class="controls-center">
            <button class="btn-prev" aria-label="Previous track" title="Previous (Shift+Left)">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="btn-play" aria-label="Play" title="Play/Pause (Space)">
              <svg class="icon-play" viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" width="28" height="28" style="display:none"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="btn-next" aria-label="Next track" title="Next (Shift+Right)">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
          </div>

          <div class="volume-row">
            <button class="btn-mute" aria-label="Mute" title="Mute (M)">
              <svg class="icon-vol-on" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
              <svg class="icon-vol-off" viewBox="0 0 24 24" width="18" height="18" style="display:none"><path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>
            <input type="range" class="volume-slider" min="0" max="100" value="80" aria-label="Volume">
            <span class="volume-value">80%</span>
          </div>
        </div>
      </section>

      <!-- Library Controls -->
      <section class="library-controls" aria-label="Library filters">
        <input type="search" class="search-input" placeholder="Search mixes..." aria-label="Search tracks">
        <div class="genre-filters" role="group" aria-label="Filter by genre">
          <button class="genre-btn active" data-genre="all">All</button>
          <button class="genre-btn" data-genre="Deep House">Deep House</button>
          <button class="genre-btn" data-genre="Techno">Techno</button>
          <button class="genre-btn" data-genre="Drum & Bass">DnB</button>
          <button class="genre-btn" data-genre="Progressive House">Progressive</button>
          <button class="genre-btn" data-genre="Synthwave">Synthwave</button>
          <button class="genre-btn" data-genre="UK Garage">Garage</button>
        </div>
      </section>

      <!-- Tracklist -->
      <section class="tracklist" aria-label="Track library">
        <div class="tracklist-header">
          <span class="col-num">#</span>
          <span class="col-title">Title</span>
          <span class="col-bpm">BPM</span>
          <span class="col-genre">Genre</span>
          <span class="col-key">Key</span>
          <span class="col-duration">Duration</span>
        </div>
        <ul class="tracklist-items" role="list">
          <!-- populated by JS -->
        </ul>
        <p class="no-results" style="display:none">No tracks match your search.</p>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
